<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API 连接测试</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        .card {
            background: white;
            border-radius: 16px;
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
        }
        h1 {
            color: white;
            text-align: center;
            margin-bottom: 30px;
            font-size: 28px;
        }
        h2 {
            color: #333;
            margin-bottom: 20px;
            font-size: 20px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
        }
        input, select {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.2s;
        }
        input:focus, select:focus {
            outline: none;
            border-color: #667eea;
        }
        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .btn:hover {
            transform: translateY(-2px);
        }
        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .result {
            background: #f8f9fa;
            border-radius: 8px;
            padding: 20px;
            margin-top: 20px;
            border-left: 4px solid #667eea;
        }
        .result.success {
            border-left-color: #22c55e;
            background: #f0fdf4;
        }
        .result.error {
            border-left-color: #ef4444;
            background: #fef2f2;
        }
        .result h3 {
            margin-bottom: 10px;
            font-size: 16px;
        }
        .result pre {
            background: white;
            padding: 15px;
            border-radius: 6px;
            overflow-x: auto;
            font-size: 13px;
            white-space: pre-wrap;
            word-break: break-all;
        }
        .status-badge {
            display: inline-block;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            margin-left: 10px;
        }
        .status-badge.success {
            background: #22c55e;
            color: white;
        }
        .status-badge.error {
            background: #ef4444;
            color: white;
        }
        .status-badge.warning {
            background: #f59e0b;
            color: white;
        }
        .config-info {
            background: #f0f9ff;
            border: 1px solid #bae6fd;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 20px;
        }
        .config-info code {
            background: white;
            padding: 2px 6px;
            border-radius: 4px;
            font-family: 'Monaco', 'Consolas', monospace;
            font-size: 13px;
        }
        .loading {
            display: flex;
            align-items: center;
            gap: 10px;
            color: #667eea;
        }
        .loading-spinner {
            width: 20px;
            height: 20px;
            border: 3px solid #667eea;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <h1>🔌 API 连接测试</h1>
    
    <div class="container">
        <!-- 配置信息 -->
        <div class="card">
            <h2>📋 当前配置</h2>
            <div class="config-info">
                <div><strong>Base URL:</strong> <code id="baseUrl">加载中...</code></div>
                <div><strong>API Key:</strong> <code id="apiKey">加载中...</code></div>
                <div><strong>模型:</strong> <code id="model">加载中...</code></div>
            </div>
        </div>
        
        <!-- 测试配置 -->
        <div class="card">
            <h2>⚙️ 测试配置</h2>
            <div class="form-group">
                <label>Base URL</label>
                <input type="text" id="testBaseUrl" value="https://223.167.85.184:3000/v1" placeholder="https://api.example.com/v1">
            </div>
            <div class="form-group">
                <label>API Key</label>
                <input type="text" id="testApiKey" value="sk-0c4c0bf2da9f4f99982918067a69b3e5" placeholder="sk-...">
            </div>
            <div class="form-group">
                <label>模型</label>
                <select id="testModel">
                    <option value="qwen-plus">qwen-plus (通义千问 Plus)</option>
                    <option value="qwen-max">qwen-max (通义千问 Max)</option>
                    <option value="qwen-turbo">qwen-turbo (通义千问 Turbo)</option>
                    <option value="glm-4">glm-4 (智谱 GLM-4)</option>
                    <option value="glm-5-fp8">glm-5-fp8 (智谱 GLM-5 FP8)</option>
                </select>
            </div>
            <button class="btn" onclick="testConnection()" id="testBtn">
                🧪 测试连接
            </button>
        </div>
        
        <!-- 测试结果 -->
        <div class="card">
            <h2>📊 测试结果</h2>
            <div id="result" class="result" style="display: none;">
                <h3 id="resultTitle">测试中...</h3>
                <pre id="resultContent"></pre>
            </div>
        </div>
    </div>

    <script>
        // 页面加载时读取配置
        window.addEventListener('DOMContentLoaded', async () => {
            await loadOpenClawConfig();
        });
        
        // 加载 OpenClaw 配置
        async function loadOpenClawConfig() {
            try {
                const paths = [
                    '../../openclaw.json',
                    '../../../openclaw.json',
                    '../../../../openclaw.json'
                ];
                
                for (const path of paths) {
                    try {
                        const response = await fetch(path);
                        if (response.ok) {
                            const config = await response.json();
                            const proxyConfig = config.models?.providers?.proxy;
                            
                            if (proxyConfig) {
                                document.getElementById('baseUrl').textContent = proxyConfig.baseUrl;
                                document.getElementById('apiKey').textContent = 
                                    proxyConfig.apiKey.substring(0, 15) + '...';
                                
                                if (proxyConfig.models && proxyConfig.models.length > 0) {
                                    document.getElementById('model').textContent = proxyConfig.models[0].id;
                                    document.getElementById('testModel').value = proxyConfig.models[0].id;
                                }
                                
                                console.log('✅ OpenClaw 配置已加载');
                                return;
                            }
                        }
                    } catch (e) {
                        continue;
                    }
                }
                
                document.getElementById('baseUrl').textContent = '未找到';
                document.getElementById('apiKey').textContent = '未找到';
                document.getElementById('model').textContent = '未找到';
                
            } catch (e) {
                console.error('❌ 加载配置失败:', e);
            }
        }
        
        // 测试连接
        async function testConnection() {
            const btn = document.getElementById('testBtn');
            const result = document.getElementById('result');
            const resultTitle = document.getElementById('resultTitle');
            const resultContent = document.getElementById('resultContent');
            
            const baseUrl = document.getElementById('testBaseUrl').value.trim();
            const apiKey = document.getElementById('testApiKey').value.trim();
            const model = document.getElementById('testModel').value;
            
            // 禁用按钮
            btn.disabled = true;
            btn.innerHTML = '<div class="loading"><div class="loading-spinner"></div><span>测试中...</span></div>';
            
            // 隐藏旧结果
            result.style.display = 'none';
            
            try {
                // 调用 API
                const response = await fetch(`${baseUrl}/chat/completions`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${apiKey}`
                    },
                    body: JSON.stringify({
                        model: model,
                        messages: [
                            {
                                role: 'system',
                                content: '你是一个测试助手。'
                            },
                            {
                                role: 'user',
                                content: '你好，请回复"连接成功"，并告诉我你是什么模型。'
                            }
                        ],
                        temperature: 0.7,
                        max_tokens: 200
                    })
                });
                
                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(`HTTP ${response.status}: ${error.message || error.error?.message || '未知错误'}`);
                }
                
                const data = await response.json();
                const answer = data.choices[0].message.content;
                
                // 显示成功结果
                result.className = 'result success';
                resultTitle.innerHTML = '✅ 连接成功 <span class="status-badge success">成功</span>';
                resultContent.textContent = `模型回复：\n\n${answer}\n\n---\n使用模型：${model}\n消耗 tokens: ${JSON.stringify(data.usage, null, 2)}`;
                
            } catch (error) {
                // 显示错误结果
                result.className = 'result error';
                resultTitle.innerHTML = '❌ 连接失败 <span class="status-badge error">失败</span>';
                resultContent.textContent = `错误信息：\n\n${error.message}\n\n请检查：\n1. API 密钥是否正确\n2. Base URL 是否可访问\n3. 模型名称是否正确\n4. 网络连接是否正常`;
            } finally {
                // 恢复按钮
                btn.disabled = false;
                btn.textContent = '🧪 重新测试';
                result.style.display = 'block';
            }
        }
    </script>
</body>
</html>
